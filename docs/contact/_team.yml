# Team page data — edit this file, then run scripts/build_team_page.py
# (or push, and the GitHub Action regenerates team.md automatically).
#
# Fields per member:
#   name          (required)  full name
#   affiliation   (optional)  country and/or organisation shown after "— "
#   role          (optional)  short role description (e.g. "Data Modeller. OpRa Subgroup Leader.")
#   photo         (optional)  filename in docs/assets/images/transmodel-cen/
#   photo_missing (optional)  true → renders "*(photo missing)*" instead of image
#   photo_width   (optional)  pixel width for the image (default 150)
#   standards     (optional)  list of standard ids the person works on
#                             valid ids: transmodel, netex, siri, ojp, opra, eudit, efip, cyclinfra, bt4pt
#                             empty list or missing → renders "*to be confirmed*"
#   honorary      (optional)  true → adds "★ Honorary member" badge
#   leader        (optional)  true → adds "◆ Leader" badge

intro: |
  The people currently shaping Transmodel and the standards derived from it — data modellers, subgroup leaders, and active contributors across CEN working groups.

  Use the filter below to see who works on each standard.

note: |
  !!! note "Missing photos and standard assignments"
      A few profile photos (Andrej Tibaut and Sara Guerra de Oliveira) were not included in the site export and will be re-added when available.

      Standards-per-member is mostly filled in with placeholders — most members are marked *"to be confirmed"*. As we gather this info, the filter will become more useful.

filters:
  - id: all
    label: All
  - id: transmodel
    label: Transmodel (SG4)
  - id: netex
